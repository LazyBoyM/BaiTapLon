name: 🚀 MarketHub Automated CI/CD (GitHub Actions + Self-Hosted Runner)

on:
  push:
    branches: [ main ]

jobs:
  cloud-validation:
    name: ⚡ Cloud CI Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🐳 Validate Docker Compose Architecture
        run: |
          docker compose config --quiet
          echo "✅ Docker Compose syntax verified on Cloud!"

  deploy-to-server:
    name: 🚀 Auto Deploy on CentOS 7 Server
    needs: cloud-validation
    runs-on: self-hosted

    steps:
      - name: 🔄 Pull & Rebuild Microservices on Server
        run: |
          cd /root/marketplace-git
          git pull origin main
          docker compose -p marketplace up -d --build
          echo "🎉 Automated deployment on CentOS 7 VM completed successfully!"
