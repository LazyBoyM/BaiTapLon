name: 🚀 MarketHub Automated CI/CD (GitHub Actions + Self-Hosted Runner)

on:
  push:
    branches: [ main ]

jobs:
  cloud-validation:
    name: ⚡ Cloud CI Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🐳 Validate Docker Compose Architecture
        run: |
          docker compose config --quiet
          echo "✅ Docker Compose syntax verified on Cloud!"

  deploy-to-server:
    name: 🚀 Auto Deploy on CentOS 7 Server
    needs: cloud-validation
    runs-on: self-hosted

    steps:
      - name: 🔄 Sync Source Code & Build on Host Volume
        run: |
          mkdir -p /root/marketplace-git
          git config --global --add safe.directory '*' || true
          cd /root/marketplace-git
          if [ ! -d ".git" ]; then
            echo "📥 Cloning repository freshly into host volume..."
            git clone https://github.com/LazyBoyM/BaiTapLon.git .
          else
            echo "🔄 Pulling latest commit from GitHub..."
            git fetch --all
            git reset --hard origin/main
          fi
          echo "🔥 Building and force recreating 18 Docker microservices..."
          docker compose -p marketplace up -d --build --force-recreate --remove-orphans
          docker ps
          echo "🎉 Automated deployment on CentOS 7 VM completed successfully!"
