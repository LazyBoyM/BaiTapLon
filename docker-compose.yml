version: '3.8'

services:
  # ==================== FRONTEND ====================
  frontend:
    build: ./frontend
    container_name: marketplace-frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - marketplace-net

  # ==================== NGINX GATEWAY ====================
  nginx-gateway:
    build: ./nginx-gateway
    container_name: marketplace-gateway
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - frontend
      - user-service
      - product-service
    networks:
      - marketplace-net

  # ==================== USER SERVICE ====================
  user-service:
    build: ./user-service
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://root:example@shared-db:27017/user-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      - shared-db
    networks:
      - marketplace-net

  # ==================== PRODUCT SERVICE ====================
  product-service:
    build: ./product-service
    ports:
      - "5002:5002"
    environment:
      - MONGO_URI=mongodb://root:example@shared-db:27017/product-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - USER_SERVICE_URL=http://user-service:5001
    depends_on:
      - shared-db
    networks:
      - marketplace-net

  # ==================== SHARED DATABASE ====================
  shared-db:
    image: mongo:6.0
    container_name: marketplace-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - shared-db-data:/data/db
    networks:
      - marketplace-net

# ==================== VOLUMES ====================
volumes:
  shared-db-data:

# ==================== NETWORKS ====================
networks:
  marketplace-net:
    driver: bridge