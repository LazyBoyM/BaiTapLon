server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Hỗ trợ React Router (SPA) - chuyển hướng mọi đường dẫn về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy các API request sang Nginx Gateway
    location /api/ {
        proxy_pass http://nginx-gateway:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
        proxy_pass http://nginx-gateway:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /notification-socket/ {
        proxy_pass http://nginx-gateway:5000/notification-socket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
