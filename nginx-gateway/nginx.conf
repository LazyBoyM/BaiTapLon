events {
    worker_connections 1024;
}

http {
    # CORS map
    map $http_origin $cors_header {
        default "";
        "~^http://localhost:3000$" "$http_origin";
        "~^http://localhost:5173$" "$http_origin";
    }

    server {
        listen 5000;
        server_name localhost;

        # Health check
        location /health {
            return 200 '{"status":"API Gateway OK"}';
            add_header Content-Type application/json;
        }

        # ==================== USER SERVICE ====================
        location /api/users {
            proxy_pass http://user-service:5001/api/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== PRODUCT SERVICE ====================
        location /api/products {
            proxy_pass http://product-service:5002/api/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== MOCKED ENDPOINTS ====================
        
        # Specific mock for Seller stats page to show nice numbers
        location /api/orders/seller/stats {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"totalRevenue":15000000,"totalSales":25,"totalPlatformFee":750000,"totalGrossRevenue":15750000,"recentSales":[]}';
        }

        # Specific mock for Admin analytics charts
        location /api/orders/admin/analytics {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"totalPlatformEarnings":750000,"revenueByDay":[{"_id":"2026-07-01","revenue":8000000,"count":10},{"_id":"2026-07-02","revenue":7750000,"count":15}],"topProducts":[{"title":"Khóa học Next.js Siêu Cấp","price":200000,"totalSold":20,"thumbnail":""}],"topSellers":[{"_id":"1","name":"Nguyễn Văn Bán","totalOrders":15,"revenue":10000000},{"_id":"2","name":"Trần Thị Shop","totalOrders":10,"revenue":5750000}]}';
        }

        # Specific mock for check purchase status to return false
        location /api/orders/check/ {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"purchased":false}';
        }

        # Generic fallback mock for other order endpoints
        location /api/orders {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/payments {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"status":"success","message":"Payment mocked"}';
        }

        location /api/reviews {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/coupons {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/notifications {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/chat {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /socket.io/ {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"status":"mocked"}';
        }

        location /notification-socket/ {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"status":"mocked"}';
        }

        # Fallback to Frontend
        location / {
            resolver 127.0.0.11 valid=5s ipv6=off;
            set $frontend_upstream "http://frontend:80";
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}