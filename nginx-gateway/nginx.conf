events {
    worker_connections 1024;
}

http {
    # CORS map
    map $http_origin $cors_header {
        default "";
        "~^http://localhost:3000$" "$http_origin";
        "~^http://localhost:5173$" "$http_origin";
    }

    server {
        listen 5000;
        server_name localhost;

        # Health check
        location /health {
            return 200 '{"status":"API Gateway OK"}';
            add_header Content-Type application/json;
        }

        # ==================== USER SERVICE ====================
        location /api/users {
            proxy_pass http://user-service:5001/api/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== PRODUCT SERVICE ====================
        location /api/products {
            proxy_pass http://product-service:5002/api/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== MOCKED SERVICES ====================
        # All other services are mocked locally by Nginx to avoid 502/network crashes
        
        location /api/orders {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/payments {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"status":"success","message":"Payment mocked"}';
        }

        location /api/reviews {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/coupons {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/notifications {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /api/chat {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '[]';
        }

        location /socket.io/ {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"status":"mocked"}';
        }

        location /notification-socket/ {
            default_type application/json;
            add_header Access-Control-Allow-Origin $cors_header;
            return 200 '{"status":"mocked"}';
        }

        # Fallback to Frontend
        location / {
            resolver 127.0.0.11 valid=5s ipv6=off;
            set $frontend_upstream "http://frontend:80";
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}