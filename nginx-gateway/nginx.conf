events {
    worker_connections 1024;
}

http {
    # CORS map
    map $http_origin $cors_header {
        default "";
        "~^http://localhost:3000$" "$http_origin";
        "~^http://localhost:5173$" "$http_origin";
    }

    server {
        listen 5000;
        server_name localhost;

        # Health check
        location /health {
            return 200 '{"status":"API Gateway OK"}';
            add_header Content-Type application/json;
        }

        # ==================== USER SERVICE ====================
        location /api/users {
            proxy_pass http://user-service:5001/api/users;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== PRODUCT SERVICE ====================
        location /api/products {
            proxy_pass http://product-service:5002/api/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== ORDER SERVICE ====================
        location /api/orders {
            proxy_pass http://order-service:5003/api/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== PAYMENT SERVICE ====================
        location /api/payments {
            proxy_pass http://payment-service:5004/api/payments;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

       # ==================== REVIEW SERVICE ====================
        location /api/reviews {
            proxy_pass http://review-service:5005/api/reviews;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== COUPON SERVICE ====================
        location /api/coupons {
            proxy_pass http://coupon-service:5006/api/coupons;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ==================== CHAT SERVICE ====================
        location /api/chat/ {
            proxy_pass http://chat-service:5007/api/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /socket.io/ {
            proxy_pass http://chat-service:5007/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Credentials "true";
        }

        location /notification-socket/ {
            proxy_pass http://notification-service:5008/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Credentials "true";
        }

        # ==================== NOTIFICATION SERVICE ====================
        location /api/notifications {
            proxy_pass http://notification-service:5008/api/notifications;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin $cors_header;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Fallback to Frontend
        location / {
            resolver 127.0.0.11 valid=5s ipv6=off;
            set $frontend_upstream "http://frontend:80";
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}